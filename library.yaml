default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

# Catálogo curado que apunta a CSBejarano/claude-code-template como source-of-truth
# de componentes generales reutilizables. CSBejarano/the-library (fork) está deprecado.
# Source-of-truth general: https://github.com/CSBejarano/claude-code-template
# Segunda fuente por dominio (runtime ADW): CSBejarano/adw-minion-pi → ver D022.
# Curación rationale: ai_docs/state/library-curation-rationale.md (working doc)
# Decisiones arquitectónicas: ai_docs/state/DECISIONS.md → D021 (source-of-truth) y D022 (multi-source ADW)

library:
  skills:
    # === Session / Context ===
    - name: continue-session
      description: Sincronizacion de estado del proyecto al inicio/cierre de sesion. Lee state files, descubre componentes, actualiza GOAL.md/PROGRESS.yaml y persiste contexto en Engram. Contraparte READ+WRITE de /prime.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/continue-session/SKILL.md
      requires: []

    - name: prime
      description: Cargador rapido de contexto del proyecto (~30s). Descubre agents, skills, commands y state files dinamicamente. Read-only, nunca modifica archivos. Version ligera de /continue-session.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/prime/SKILL.md
      requires: []

    # === Backend / Python ===
    - name: fastapi
      description: Framework Python de alto rendimiento para APIs REST. Validacion automatica con Pydantic, documentacion OpenAPI, dependency injection y async nativo.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/fastapi/SKILL.md
      requires: []

    - name: clean-arch
      description: Clean Architecture (Hexagonal/Ports & Adapters) para Python. Separacion de capas, dependency injection y testabilidad con FastAPI.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/clean-arch/SKILL.md
      requires: [skill:fastapi]

    - name: pydantic-ai
      description: Framework Python para agentes IA con type safety. Tools tipados, outputs estructurados y soporte multi-modelo (OpenAI, Anthropic, Gemini).
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/pydantic-ai/SKILL.md
      requires: []

    - name: pytest
      description: Framework de testing para Python con fixtures, markers y parametrizacion. Crea tests unitarios, integracion y E2E escalables.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/pytest/SKILL.md
      requires: []

    # === Frontend / Web ===
    - name: nextjs
      description: Framework React full-stack con App Router, Server Components y optimizaciones automaticas. Next.js 14+ para produccion.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/nextjs/SKILL.md
      requires: []

    - name: react-19
      description: React 19 con Server Components, Server Actions y hook use(). Construye interfaces modernas con RSC, streaming y Suspense.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/react-19/SKILL.md
      requires: []

    - name: tailwind
      description: Patrones y utilidades para Tailwind CSS v4. Incluye dark mode, componentes tipados, sistema de temas y diseno responsive.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/tailwind/SKILL.md
      requires: []

    # === Database / Backend infrastructure ===
    - name: supabase
      description: Plataforma backend open-source con PostgreSQL, auth, storage, edge functions y realtime. Cliente Python sync/async incluido.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/supabase/SKILL.md
      requires: []

    - name: rls
      description: Row Level Security (RLS) para PostgreSQL y Supabase. Control de acceso a nivel de fila que previene OWASP A01:2025 Broken Access Control.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/rls/SKILL.md
      requires: [skill:supabase]

    # === Payments / Invoicing ===
    - name: stripe-integration
      description: Guia E2E completa para Stripe. Setup, checkout, suscripciones, facturacion, portal, recovery, analytics, Connect y compliance Espana (IVA + VeriFactu + LOPDGDD).
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/stripe-integration/SKILL.md
      requires: [skill:fastapi, skill:spanish-invoicing]

    - name: spanish-invoicing
      description: Facturacion espanola con TicketBAI, VeriFactu, cadena hash, NIF/CIF validation, IVA tipos, series numericas y politicas RLS multi-tenant.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/spanish-invoicing/SKILL.md
      requires: [skill:rls]

    # === Comercial / Propuestas ===
    - name: commercial-proposal
      description: Presupuestos y resumenes ejecutivos cliente-facing con el look canonico StudioTek (HTML+CSS -> weasyprint). Brandbar, meta-box, fases e inversion, descuento, plan de pago, callouts. Builders data-driven (proposal) y markdown-driven (executive-summary). Usado por resumen-ejecutivo[-audio] y procesar-reunion para el PDF brandeado.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/commercial-proposal/SKILL.md
      requires: []

    # === DevOps / Infra ===
    - name: github
      description: Integracion completa con GitHub CLI y API. Gestion de repositorios, issues, PRs, branches, releases y GitHub Actions.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/github/SKILL.md
      requires: []

    - name: cloudflare-tunnel
      description: >-
        Create and manage Cloudflare tunnels to securely expose local services to the
        internet. Use when you need a public URL for localhost, testing webhooks,
        demoing without deploying, or remote access to internal services. Supports
        named tunnels with persistent subdomains, multi-service routing via ingress
        rules, DNS routing, and Zero Trust integration. Triggers: cloudflared, tunnel,
        expose localhost, public URL, webhook testing, ngrok alternative.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/cloudflare-tunnel/SKILL.md
      requires: []

    - name: deploy
      description: >-
        Multi-platform deployment skill. Supports Vercel, Railway, Supabase, Docker
        and Cloudflare Pages. Auto-detects project type and platform from config
        files. Pre-deploy checks (tests, lint, build). Post-deploy verification
        (health check, smoke test). Rollback guidance on failure. Triggers: deploy,
        desplegar, ship, push to production, release.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/deploy/SKILL.md
      requires: []

    - name: monitor
      description: >-
        Post-deploy observability skill. Health checks, uptime monitoring, log
        analysis, error tracking and performance metrics. Supports Vercel, Railway,
        Supabase and generic HTTP services. Quick diagnosis of production issues.
        Triggers: monitor, observability, health check, uptime, logs, alertas.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/monitor/SKILL.md
      requires: []

    # === Testing / Browser automation ===
    - name: playwright
      description: Browser automation con 3 modos -- CLI (direct execution), Guide (token-efficient patterns), MCP (22 MCP tools). Testing, scraping, screenshots, forms.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/playwright/SKILL.md
      requires: []

    # === Documentation / Diagrams ===
    - name: htmlvspec
      description: >-
        Genera un plan/especificacion VISUAL como una unica pagina HTML autocontenida en
        specs/htmlvspec-<slug>.html: el plan escrito directamente en HTML, una imagen-diagrama
        generada por IA (gpt-image-2 de OpenAI) por seccion (hero + por H2) creadas en paralelo y
        embebidas inline, mas una zona Freeform con HTML/CSS/SVG/JS a medida. Mejoras StudioTek:
        (1) fase de research con AGENTES EXPERTOS que enriquecen el contexto antes de redactar;
        (2) STYLE_BRIEF reutilizable para coherencia visual; (3) preflight de OPENAI_API_KEY +
        validacion de rutas de imagen + abrir en navegador. Requiere OPENAI_API_KEY y uv. Triggers
        htmlvspec, spec visual html, plan visual ilustrado, diagramas por seccion.
        (Adaptada de disler/pi-agent-observability.)
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/htmlvspec/SKILL.md
      requires: []

    - name: mermaid
      description: >-
        Render Mermaid code to PNG, SVG or PDF diagrams via mmdc CLI. Supports
        flowchart, sequence, class, ER, gantt, pie, git graph, timeline and mindmap.
        Themes: default, dark, forest, neutral. Integrates with markdown docs and
        PRs. Triggers: mermaid, diagram, flowchart, sequence diagram, ER, gantt,
        mmdc, render diagram, mindmap.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/mermaid/SKILL.md
      requires: []

    - name: markdown
      description: Guias de Markdown y GFM (GitHub Flavored Markdown). Authoring, frontmatter, linting, documentacion estructurada y templates para proyectos.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/markdown/SKILL.md
      requires: []

    - name: pdf-to-docx
      description: >-
        Bidirectional PDF to DOCX conversion. Uses pdf2docx (Python) for PDF to DOCX
        and LibreOffice headless for DOCX to PDF. Batch conversion, preserve images,
        extract text-only, OCR fallback with pytesseract. Use for commercial
        proposals, contracts, invoices, reports. Triggers: pdf to docx, docx to pdf,
        convert pdf, pdf2docx, batch convert.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/pdf-to-docx/SKILL.md
      requires: []

    # === Security / Privacy ===
    - name: owasp
      description: OWASP Top 10:2025 Security Audit (A01-A10). Incluye A03 Supply Chain y A10 Exceptional Conditions. Audita aplicaciones web, APIs y codigo contra vulnerabilidades.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/owasp/SKILL.md
      requires: []

    - name: aepd-privacidad
      description: Consultor Experto en Proteccion de Datos. RGPD, LOPDGDD, AEPD, ENS, AI Act, auditorias de privacidad, DPO, brechas de seguridad, EIPD, contratos DPA.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/aepd-privacidad/SKILL.md
      requires: []

    - name: llm-security-checklist
      description: >-
        LLM security audit checklist for AI agent systems. Triggers: security audit,
        security checklist, llm security review, agent security assessment, owasp
        check.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/llm-security-checklist/SKILL.md
      requires: [skill:owasp]

    # === Code analysis / review ===
    - name: code-analysis
      description: Analisis estatico de codigo, deteccion de patrones, metricas de complejidad, catalogos de anti-patterns y guias de refactoring para auditorias de calidad.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/code-analysis/SKILL.md
      requires: []

    - name: pr-review
      description: PR review formal con GitHub CLI. Usa gh pr review (no gh pr comment). Decision tree para APPROVE/REQUEST_CHANGES/COMMENT. Formato estructurado con findings priorizados. Triggers pr review, review pr, revisar pr, code review, gh pr review.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/pr-review/SKILL.md
      requires: [skill:github]

    # === Methodology / Workflow ===
    - name: sdd
      description: Spec Driven Design -- metodologia de desarrollo en 7 fases con subagentes (Propose, Explore, Specs, Design, Tasks, Apply TDD, Verify loop). Orquestador no codifica, contexto aislado por fase, Engram-first. Triggers sdd, spec driven, spec driven design, metodologia desarrollo.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/skills/sdd/SKILL.md
      requires: []

    # === Reuniones / Meeting intelligence ===
    - name: meeting-intelligence
      description: >-
        Procesamiento e inteligencia de reuniones. Parsea transcripciones (markdown,
        txt, audio_transcript), extrae entidades (personas, fechas, compromisos),
        clasifica topics (tecnico/negocio/organizativo) y genera informes
        estructurados con decisiones, action items priorizados y resumen ejecutivo.
        Triggers meeting intelligence, inteligencia de reunion, action items,
        decisiones, resumen reunion.
      source: https://github.com/CSBejarano/studiotek_os/blob/main/.claude/skills/meeting-intelligence/SKILL.md
      requires: []

    # === Issues / Project management ===
    - name: issues-dossier-proyectos
      description: >-
        Genera el dossier multi-proyecto de issues de GitHub de TODO StudioTek (clientes +
        operaciones + productos) en PDF apaisado, una tabla por proyecto, agrupado por
        Cliente/StudioTek/Sin-issues, ordenado por fase (clientes) o batch/épica (internos), con
        bandas de sección (banda + header del mismo color) que se repiten al cambiar de página,
        cards de resumen, zebra por épica y banners de grupo/proyecto. Incluye el motor de
        maquetación canónico render_dossier.py (HTML apaisado -> weasyprint). READ-ONLY. Triggers
        issues-dossier-proyectos, dossier de issues, dossier multi-proyecto, issues por proyecto a pdf.
      source: /Users/cristianbejaranomendez/Developer/StudioTek/30-operaciones/app-control-studiotek/.claude/skills/issues-dossier-proyectos/SKILL.md
      requires: []

  agents:
    # === Senior engineers (standalone, sin acoplamiento al template) ===
    - name: backend
      description: Senior Backend Engineer experto en FastAPI, SQLAlchemy, PostgreSQL y Clean Architecture. Especialista en RLS, multi-tenancy, async patterns y PydanticAI.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/agents/backend.md
      requires:
        - skill:fastapi
        - skill:clean-arch
        - skill:pydantic-ai
        - skill:supabase
        - skill:pytest
        - skill:aepd-privacidad
        - skill:github
        - skill:code-analysis
        - skill:spanish-invoicing
        - skill:stripe-integration

    - name: frontend
      description: Senior Frontend Engineer experto en React, TypeScript, Tailwind CSS y arquitecturas de componentes. Especialista en UI/UX, accesibilidad, performance y estado de aplicaciones modernas.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/agents/frontend.md
      requires:
        - skill:react-19
        - skill:nextjs
        - skill:tailwind
        - skill:playwright
        - skill:aepd-privacidad
        - skill:github
        - skill:code-analysis
        - skill:clean-arch

    - name: testing
      description: Senior QA Engineer experto en testing strategies, pytest, test automation y quality assurance. Especialista en unit tests, integration tests, E2E, mocking, fixtures y coverage.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/agents/testing.md
      requires:
        - skill:pytest
        - skill:owasp
        - skill:rls
        - skill:playwright
        - skill:aepd-privacidad
        - skill:github
        - skill:code-analysis

    - name: infra
      description: Senior DevOps/Infrastructure Engineer experto en Docker, CI/CD, Kubernetes, Terraform y cloud platforms. Especialista en automatizacion, deployment pipelines, observabilidad y seguridad de infraestructura.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/agents/infra.md
      requires:
        - skill:github
        - skill:deploy
        - skill:monitor
        - skill:cloudflare-tunnel

    # === Reviewers especializados ===
    - name: quality-reviewer
      description: Senior Software Engineer especializado en code quality, clean code, design patterns, performance y maintainability. Complementa al review formal con foco en calidad tecnica del codigo.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/agents/quality-reviewer.md
      requires:
        - skill:pytest
        - skill:clean-arch
        - skill:github
        - skill:code-analysis
        - skill:owasp

    - name: security-reviewer
      description: Senior Security Engineer especializado en OWASP Top 10, auditorias de seguridad, vulnerabilidades de codigo, auth/authz y secure coding practices.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/agents/security-reviewer.md
      requires:
        - skill:owasp
        - skill:rls
        - skill:supabase
        - skill:aepd-privacidad
        - skill:github
        - skill:code-analysis

    # === Compliance / Privacy ===
    - name: aepd-consultant
      description: DPO (Data Protection Officer) y Consultor Experto en Proteccion de Datos. Especialista en RGPD, LOPDGDD, AEPD, auditorias de privacidad, matrices de riesgo, clausulas informativas y contratos DPA.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/agents/aepd-consultant.md
      requires:
        - skill:aepd-privacidad
        - skill:code-analysis

    # === Legal / NDA pipeline (orquestacion jerarquica 3 niveles) ===
    - name: nda-orchestrator
      description: >-
        NDA pipeline (apex): orquesta la generacion de un NDA bilateral
        RGPD-compliant para un cliente. Coordina nda-research-lead + nda-legal-lead,
        gestiona el gate humano y los gates de calidad G1/G3. No investiga ni redacta
        — delega todo.
      source: https://github.com/CSBejarano/studiotek_os/blob/main/.claude/agents/legal/nda-orchestrator.md
      requires:
        - agent:nda-research-lead
        - agent:nda-legal-lead

    - name: nda-research-lead
      description: >-
        NDA pipeline (research lead): coordina scout-tavily + scout-perplexity para
        identificar al cliente y consolida CLIENT-PROFILE.yaml (schema 1.2) con los 6
        campos de PARTE B, discrepancias y nivel de confianza. No redacta el NDA.
      source: https://github.com/CSBejarano/studiotek_os/blob/main/.claude/agents/legal/nda-research-lead.md
      requires:
        - agent:scout-tavily
        - agent:scout-perplexity

    - name: nda-legal-lead
      description: >-
        NDA pipeline (legal lead): a partir del CLIENT-PROFILE.yaml aprobado coordina
        legal-doc-generator + legal-reviewer + legal-privacy-auditor y consolida el
        NDA final nda_<slug>.md aplicando los hallazgos y las reglas de redaccion
        profesional.
      source: https://github.com/CSBejarano/studiotek_os/blob/main/.claude/agents/legal/nda-legal-lead.md
      requires:
        - agent:legal-doc-generator
        - agent:legal-reviewer
        - agent:legal-privacy-auditor

    - name: legal-doc-generator
      description: "Legal pipeline: genera documentos legales (contratos, facturas, propuestas, politicas de privacidad)."
      source: https://github.com/CSBejarano/studiotek_os/blob/main/.claude/agents/legal/doc-generator.md
      requires: []

    - name: legal-reviewer
      description: "Legal pipeline: revisa documentos generados contra normativa vigente y mejores practicas."
      source: https://github.com/CSBejarano/studiotek_os/blob/main/.claude/agents/legal/reviewer.md
      requires: []

    - name: legal-privacy-auditor
      description: "Legal pipeline: auditoria RGPD/LOPDGDD completa de datos personales, consentimiento y derechos ARCO."
      source: https://github.com/CSBejarano/studiotek_os/blob/main/.claude/agents/legal/privacy-auditor.md
      requires: []

    # === Research scouts (reutilizables fuera del pipeline NDA) ===
    - name: scout-tavily
      description: >-
        Scout de web search profundo con Tavily MCP: crawling, extraction de
        contenido y busqueda avanzada con filtros. Para pipelines de research
        intensivo. Triggers web search, tavily, crawl, buscar web, articulos.
      source: https://github.com/CSBejarano/studiotek_os/blob/main/.claude/agents/research/scout-tavily.md
      requires: []

    - name: scout-perplexity
      description: >-
        Scout de razonamiento profundo con Perplexity MCP: investigacion academica,
        comparativas y analisis de trade-offs. Para pipelines que necesitan analisis
        riguroso. Triggers perplexity, razonamiento, academico, comparativa, papers.
      source: https://github.com/CSBejarano/studiotek_os/blob/main/.claude/agents/research/scout-perplexity.md
      requires: []

  prompts:
    # === ADW / Installer ===
    - name: instalador_adw
      description: >-
        Instala ADW desde el repo destino (target-side) con source hibrido
        (ADW_SOURCE_ROOT, checkout local o clone a ~/.cache), dry-run obligatorio,
        confirmacion explicita, backups, ajuste de .gitignore y provision de deps
        Python. Invoca el instalador deterministico (no reimplementa). Complementa
        install_adw_in_target_repo (push source-side). Triggers instalador adw,
        instalar adw, bootstrap adw target.
      source: https://github.com/CSBejarano/adw-minion-pi/blob/main/.claude/commands/instalador_adw.md
      requires: []

    # === Issues / Project management ===
    - name: issues-dossier
      description: >-
        Lista los issues de GitHub del proyecto (auto-detecta repo único o
        multi-repo command-center, u override por args), los clasifica por
        épica/batch/orden de prioridad de implementación y genera un dossier
        .md → .pdf (una página por repo, listo para imprimir) con la plantilla
        canónica de issue StudioTek. Portable, runtime, READ-ONLY. Triggers:
        issues, dossier de issues, listar issues, clasificar issues, issues a pdf.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/commands/issues-dossier.md
      requires: []

    # === Scaffolding / Meta ===
    - name: new-system
      description: >-
        Meta-comando para arrancar un sistema StudioTek nuevo de punta a punta:
        discovery en 00-studiotek_os, research consolidado (5 scouts), diseno
        visual con diagramas Mermaid + tree y gate humano, scaffold del repo
        (4 stacks: python-batch, fullstack-next, api-service, cli) y git init.
        Sucesor portable del pipeline idea-to-system. Triggers: new-system,
        crear sistema, scaffold repo, nuevo proyecto StudioTek.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/commands/new-system.md
      requires: []

    # === Reuniones / Cliente-facing ===
    - name: procesar-reunion
      description: >-
        Procesa el audio de una reunion de cliente end-to-end: transcribe (Whisper),
        limpia, estructura por interlocutor y genera dos informes (mini-PRD +
        epicas/historias/issues de GitHub). Es el pipeline base de
        sistema_reuniones_clientes; reutiliza su adapter whisper.py via uv run.
        Portable, runtime, valido para cualquier repo cliente. Triggers procesar
        reunion, transcribir reunion, audio a informe, mini-prd reunion.
      source: https://github.com/CSBejarano/sistema-reuniones-clientes/blob/main/.claude/commands/procesar-reunion.md
      requires: []

    - name: resumen-ejecutivo-audio
      description: >-
        Procesa el audio de una reunion de cliente end-to-end y produce un resumen
        ejecutivo cliente-facing (Markdown + PDF brandeado) con propuesta de
        presupuesto anclada a presupuestos previos. Reutiliza el pipeline de
        transcripcion Whisper de sistema_reuniones_clientes (uv run) y aplica el
        objetivo, formato y reglas de calidad de un resumen ejecutivo. Portable,
        runtime, valido para cualquier repo cliente. Triggers resumen ejecutivo
        audio, procesar reunion ejecutivo, audio a resumen ejecutivo.
      source: https://github.com/CSBejarano/claude-code-template/blob/main/.claude/commands/resumen-ejecutivo-audio.md
      requires: [skill:commercial-proposal, prompt:procesar-reunion]

    - name: parse-call-transcript
      description: >-
        Parseo estructurado de transcripciones de llamadas/reuniones (Google Meet,
        WhatsApp audio, grabaciones) con identificacion precisa de speakers antes de
        extraer acuerdos, decisiones o generar deliverables. Evita errores de
        atribucion cuando las voces estan entremezcladas sin etiquetas explicitas.
